<!doctype html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>IndiaIPO — India's Leading IPO Consultancy Platform</title>

  <meta name="description"
    content="Expert IPO consultancy for SME IPO, Mainline IPO, FPO, Pre-IPO funding. SEBI registered advisory firm." />

  <meta name="author" content="IndiaIPO" />

  <!-- Content Security Policy to prevent XSS attacks -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://apis.google.com https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https: http:; connect-src 'self' https: wss: http: http://localhost:5000; media-src 'self' https: data:; object-src 'none'; frame-src 'self' https://www.youtube.com https://youtube.com;" />
  <meta http-equiv="X-XSS-Protection" content="1; mode=block" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />


  <link rel="icon" href="/favicon.png" type="image/png" />

  <!-- Preconnect and asynchronously load Google Fonts to fix render-blocking -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Montserrat:wght@400;500;600;700;800;900&display=swap" media="print" onload="this.media='all'">
  <noscript>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Montserrat:wght@400;500;600;700;800;900&display=swap">
  </noscript>

  <!-- Preload main JS - Changed to as="script" but removed preload to fix browser warning if not used early enough -->
  
  <!-- Preconnect for faster API calls -->
  <link rel="preconnect" href="https://ipoapi.padmanutri.com">

  <!-- Open Graph -->
  <meta property="og:title" content="IndiaIPO — India's Leading IPO Consultancy" />
  <meta property="og:description" content="Expert IPO consultancy for SME IPO, Mainline IPO, FPO, Pre-IPO funding." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="/favicon.png" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@IndiaIPO" />
  <meta name="twitter:image" content="/favicon.png" />

</head>

<body>

  <div id="root"></div>

  <script type="module" src="/src/main.tsx"></script>

</body>

</html>
